version: '3.8'

services:
  # Relational database
  postgres:
    image: postgres:15-alpine
    container_name: smart_reader_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: smart_reader_storage
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Reverse proxy (commented out for now because the config has not been created yet)
  # nginx:
  #   ...

volumes:
  postgres_data:
  minio_data:
